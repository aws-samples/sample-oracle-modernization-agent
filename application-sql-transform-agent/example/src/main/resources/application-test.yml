spring:
  application:
    name: amzn-backoffice
  
  # 데이터베이스 자동 설정 비활성화
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.mybatis.spring.boot.autoconfigure.MybatisAutoConfiguration

# 서버 설정
server:
  port: 8080
  servlet:
    context-path: /amzn-bo
    encoding:
      charset: UTF-8
      enabled: true
      force: true

# 로깅 설정
logging:
  level:
    amzn.bo: INFO
    root: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# 관리 엔드포인트 설정
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# 커스텀 설정
amzn:
  bo:
    version: 1.0.0
    environment: test
    features:
      analytics-enabled: false
      batch-processing-enabled: false
      notification-enabled: false
